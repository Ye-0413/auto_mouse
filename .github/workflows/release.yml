name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pip install pyinstaller
          pyinstaller auto_mouse.spec --clean
          ls -la dist/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoMouse-macos
          path: dist/AutoMouse

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Windows exe
        run: |
          pip install pyinstaller
          pyinstaller auto_mouse.spec --clean
          dir dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoMouse-windows
          path: dist/AutoMouse

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoMouse-macos
          path: release/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoMouse-windows
          path: release/windows

      - name: Debug macOS contents
        run: |
          echo "=== macOS release contents ==="
          find release/macos -type f -o -type d | head -20

      - name: Debug Windows contents
        run: |
          echo "=== Windows release contents ==="
          find release/windows -type f -o -type d | head -20

      - name: Create macOS zip
        run: |
          cd release/macos
          # Zip everything in this directory
          zip -r ../macos/AutoMouse-macos.zip .

      - name: Create Windows zip
        run: |
          cd release/windows
          pwsh -Command "Compress-Archive -Path . -DestinationPath ../windows/AutoMouse-windows.zip -Force"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/macos/AutoMouse-macos.zip
            release/windows/AutoMouse-windows.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
